version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pingorder-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pingorder
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app_server:
    build: ./app
    container_name: pingorder-app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pingorder
      - SESSION_BACKEND=memory
      - INSTANCE_ID=app-1
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  reverse-proxy:
    build: ./reverse-proxy
    container_name: pingorder-proxy
    ports:
      - "8080:80"
    depends_on:
      - app_server
