<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PingOrder - Operator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="align-items: center;">
        <img src="images/logo.png" alt="logo" style="height: 120px; border-radius: 50%; margin-right: 20px;">
        <a href="catalog.html">Back to Store</a>
        <a href="operator.html" class="active">Operator Dash</a>
        <div style="flex-grow: 1;"></div>
        <a href="dashboard.html">Observability</a>
    </nav>

    <div class="container">
        <div style="display: flex; gap: 2rem; align-items: center; margin-bottom: 2rem;">
            <img src="images/operator.png" alt="Operator" style="width: 100px; border-radius: 12px; border: 2px solid var(--primary);">
            <h1 style="margin: 0;">Active Orders Management</h1>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="order-table"></tbody>
        </table>
    </div>

    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        select { background: #222; color: white; border: 1px solid var(--border); padding: 5px; border-radius: 4px; }
    </style>

    <script src="client.js"></script>
    <script>
        async function loadOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const list = document.getElementById('order-table');
            
            list.innerHTML = orders.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.username}</td>
                    <td>$${o.total}</td>
                    <td><b class="status-${o.status.toLowerCase()}">${o.status}</b></td>
                    <td>
                        <select onchange="updateStatus(${o.id}, this.value)">
                            <option value="New" ${o.status === 'New' ? 'selected' : ''}>New</option>
                            <option value="Preparing" ${o.status === 'Preparing' ? 'selected' : ''}>Preparing</option>
                            <option value="Shipping" ${o.status === 'Shipping' ? 'selected' : ''}>Shipping</option>
                            <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`/api/orders/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        loadOrders();
        setInterval(loadOrders, 3000);
    </script>
</body>
</html>
