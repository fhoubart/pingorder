<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PingOrder - Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="align-items: center;">
        <img src="images/logo.png" alt="logo" style="height: 120px; border-radius: 50%; margin-right: 20px;">
        <a href="catalog.html" class="active">Catalog</a>
        <a href="cart.html">Cart <span id="cart-count">0</span></a>
        <a href="tracking.html">My Orders</a>
        <div style="flex-grow: 1;"></div>
        <a href="dashboard.html">Observability</a>
        <a href="storm.html">Storm Generator</a>
        <a href="#" onclick="logout(); return false;" style="color: var(--danger); margin-right: 15px;">Logout</a>
        <span id="user-display" style="color: var(--primary); font-weight: bold;"></span>
    </nav>

    <div class="container">
        <h1>Fresh Fish Catalog</h1>
        <div id="product-list" class="grid"></div>
    </div>

    <script src="client.js"></script>
    <script>
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p class="metric-value">$${p.price}</p>
                    <button onclick='Cart.add(${JSON.stringify(p)})'>Add to Cart</button>
                </div>
            `).join('');
        }
        loadProducts();
    </script>
</body>
</html>
